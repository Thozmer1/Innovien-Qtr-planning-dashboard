function mcalc(roll){
 const target=v5.q2_exit+M_grow;
 const grossNeed=roll+M_grow;
 const credit=M_credit?v5.new_confirmed:0;
 const netNeed=Math.max(0,grossNeed-credit);
 const expected=v5.q2_exit-roll+v5.new_confirmed;
 const gap=target-expected;
 const n=Math.ceil(netNeed/M_avg);
 return {target,grossNeed,netNeed,expected,gap,n};
}
function feas(n){
 if(n<=v5.hist_q2_2026) return ['Achievable','tag'];

 return ['Above historical capacity','tag warn'];
}

 <div class="panel"><h3>How timing changes the requirement</h3><p class="note">The later the ramp starts, the steeper the weekly growth needed to still hit ${ '$'+(v6.annual_target/1e6).toFixed(0)+'M' }.</p><div class="scrollbox"><table id="r_tbl"></table></div></div>
</div>`;

function reqGrowth(start){ // revenue $/wk needed to hit target given ramp start
 const need = (GTGT - H1) - NW6*R0;          // extra H2 revenue beyond flat run-rate
 const m = NW6 - start + 1; const T = m*(m+1)/2;
 return T>0 ? need/T : 0;
}
function project(start,g){
 const arr=[]; let cum=0;
 for(let i=1;i<=NW6;i++){ const r = i<start ? R0 : R0 + (i-start+1)*g; arr.push(r); cum+=r; }
 return {arr,cum,h2:cum,year:H1+cum,exit:arr[arr.length-1]};
}
function v6render(){
 rampStart=+$('#r_start').value; showSpread=$('#r_basis').checked;
 const req=reqGrowth(rampStart);
 if(gManual===null) $('#r_g').value=Math.round(req/1000)*1000;
 const g=+$('#r_g').value||0;
 $('#r_startlbl').textContent=rampStart;
 const conv=v=>showSpread?v*MARG:v;     // revenue -> spread if toggled
 const lbl=showSpread?'spread':'revenue';
 const p=project(rampStart,g);
 $('#r_need').textContent=fmt$(conv(req))+'/wk';
 $('#r_h2').textContent='$'+(p.h2/1e6).toFixed(1)+'M';
 $('#r_year').textContent='$'+(p.year/1e6).toFixed(1)+'M';
 const gap=GTGT-p.year;
 $('#r_gap').innerHTML=`<span class="${gap>0?'down':'up'}">${(gap>=0?'-':'+')}$${(Math.abs(gap)/1e6).toFixed(1)}M</span>`;
 $('#r_exit').textContent=fmt$(conv(p.exit))+'/wk';
 const mult=(p.exit/R0).toFixed(1);
 $('#r_verdict').innerHTML=`To reach <b>$${(GTGT/1e6).toFixed(0)}M</b> with the ramp starting week ${rampStart}, weekly ${lbl} must grow <b>${fmt$(conv(req))}/wk every week</b> — ending the year at <b>${fmt$(conv(R0+ (NW6-rampStart+1)*req))}/wk</b> (~${mult}× today). <span class="tag warn">Well above organic booking pace</span>`;
 // chart
 const labels=[]; const d0=new Date(2026,5,29);
 for(let i=0;i<NW6;i++){const dt=new Date(d0.getTime()+i*7*864e5);labels.push((dt.getMonth()+1)+'/'+dt.getDate());}
 let cum=0; const cumArr=p.arr.map(r=>{cum+=conv(r);return Math.round(cum);});
 const ctx=$('#r_chart').getContext('2d');
 chart('r_chart',{data:{labels,datasets:[
   {type:'line',label:'Weekly '+lbl+' run-rate',data:p.arr.map(r=>Math.round(conv(r))),borderColor:GD,backgroundColor:G+'33',fill:true,tension:.25,pointRadius:0,borderWidth:2.5,yAxisID:'y'},
   {type:'line',label:'Cumulative H2 '+lbl,data:cumArr,borderColor:GR,borderDash:[5,4],fill:false,tension:.2,pointRadius:0,borderWidth:2,yAxisID:'y1'}
 ]},options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
   plugins:{legend:{position:'top'},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt$(c.raw)}},
     annotation:{}},
   scales:{y:{title:{display:true,text:'weekly $'},ticks:{callback:fmtK}},
           y1:{position:'right',title:{display:true,text:'cumulative H2 $'},grid:{drawOnChartArea:false},ticks:{callback:v=>'$'+(v/1e6).toFixed(0)+'M'}}}}});
 // timing table
 let h='<thead><tr><th>Ramp starts</th><th>Req. weekly growth</th><th>Exit run-rate</th></tr></thead><tbody>';
 [1,3,7,11,14,18].forEach(s=>{const rq=reqGrowth(s);const ex=R0+(NW6-s+1)*rq;
   h+=`<tr${s==rampStart?' style="background:#f1f7e6"':''}><td>Week ${s}</td><td>${fmt$(conv(rq))}/wk</td><td>${fmt$(conv(ex))}/wk</td></tr>`;});
 h+=`<tr><td class="mini">Flat (no growth)</td><td class="mini">$0</td><td class="mini">H2 = $${(NW6*R0/1e6).toFixed(1)}M → year $${((H1+NW6*R0)/1e6).toFixed(1)}M</td></tr>`;
 $('#r_tbl').innerHTML=h+'</tbody>';
}
$('#r_start').addEventListener('input',()=>{gManual=null;document.querySelectorAll('#r_presets button').forEach(b=>b.classList.toggle('active',+b.dataset.s===+$('#r_start').value));v6render();});
$('#r_presets').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;gManual=null;$('#r_start').value=b.dataset.s;document.querySelectorAll('#r_presets button').forEach(x=>x.classList.remove('active'));b.classList.add('active');v6render();});
$('#r_g').addEventListener('input',()=>{gManual=$('#r_g').value;v6render();});
$('#r_basis').addEventListener('change',()=>{gManual=gManual;v6render();});

function v0bar(canvas,slices,key,color){
 const rows=slices[key].slice(0,10);
 chart(canvas,{type:'bar',data:{labels:rows.map(r=>r.name),datasets:[{data:rows.map(r=>Math.abs(r.val)),backgroundColor:color}]},
  options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt$(c.raw)}}},scales:{x:{ticks:{callback:fmtK}}}}});
}
function v0tbl(id,slices,key,neg){
 const rows=slices[key];
 let h='<thead><tr><th>'+(key=='cust'?'Customer':key=='am'?'Account Manager':'Recruiter')+'</th><th>Weekly $</th></tr></thead><tbody>';
 rows.forEach(r=>{h+=`<tr><td>${r.name}</td><td class="${neg?'down':'up'}">${neg?'−':'+'}${fmt$(Math.abs(r.val))}</td></tr>`;});
 document.getElementById(id).innerHTML=h+'</tbody>';
}

 // AM scorecard

 v0.am_scorecard.forEach(r=>{a+=`<tr><td>${r.name}</td><td>${r.meetings}</td><td>${r.avg_mtg}</td><td class="${r.net<0?'down':r.net>0?'up':''}">${r.net?(r.net<0?'−':'+')+fmt$(Math.abs(r.net)):'–'}</td><td>${r.close==null?'–':r.close+'%'}</td><td>${r.starts}</td><td>${r.offers}</td></tr>`;});
 document.getElementById('v0_am').innerHTML=a+'</tbody>';
 // Recruiter scorecard
 let rc='<thead><tr><th>Recruiter</th><th>Avg subs/wk</th><th>Subs</th><th>Avg calls/wk</th><th>Avg screens/wk</th><th>Net spread</th><th>Starts</th><th>Offers</th></tr></thead><tbody>';
 v0.rec_scorecard.forEach(r=>{rc+=`<tr><td>${r.name}</td><td>${r.avg_subs}</td><td>${r.total_subs}</td><td>${r.avg_calls}</td><td>${r.avg_screens}</td><td class="${r.net<0?'down':r.net>0?'up':''}">${r.net?(r.net<0?'−':'+')+fmt$(Math.abs(r.net)):'–'}</td><td>${r.starts}</td><td>${r.offers}</td></tr>`;});
 document.getElementById('v0_rec').innerHTML=rc+'</tbody>';
}
