function mcalc(roll){
 const target=v5.q2_exit+M_grow;
 const grossNeed=roll+M_grow;
 const credit=M_credit?v5.new_confirmed:0;
 const netNeed=Math.max(0,grossNeed-credit);
 const expected=v5.q2_exit-roll+v5.new_confirmed;
 const gap=target-expected;
 const n=Math.ceil(netNeed/M_avg);
 return {target,grossNeed,netNeed,expected,gap,n};
}
function feas(n){
 if(n<=v5.hist_q2_2026) return ['Achievable','tag'];
 if(n<=v5.hist_peak) return ['Stretch (near 2025 peak)','tag warn'];
 return ['Above historical capacity','tag warn'];
}

 M_grow=+$('#m_grow').value||0; M_avg=+$('#m_avg').value||1000; M_credit=$('#m_credit').checked;
 $('#m_avglbl').textContent=M_avg.toLocaleString(); $('#m_growlbl').textContent=M_grow.toLocaleString();

function v1drill(name){
 const f=v1cur=='cust_flow'?'customer':v1cur=='am_flow'?'am':'rec';
 const ins=DET.add.filter(r=>r[f]===name).map(r=>({...r,dir:'New start',amt:r.spread}));
 const outs=DET.roll.filter(r=>r[f]===name).map(r=>({...r,dir:'Roll-off',amt:-r.spread}));
 const rows=[...ins,...outs].sort((a,b)=>a.amt-b.amt);
 const cols=[{k:'dir',label:''},{k:'contractor',label:'Contractor'},{k:'customer',label:'Customer'},
  {k:'am',label:'AM'},{k:'rec',label:'Recruiter'},{k:'date',label:'Wk'},
  {k:'amt',label:'Weekly $',r:1,fmt:v=>`<span class="${v<0?'down':'up'}">${v<0?'-':'+'}${fmt$(Math.abs(v))}</span>`}];
 openDrill(name, `${ins.length} new start(s) · ${outs.length} roll-off(s) in Q3`, dtbl(cols,rows));
}
function v3drill(name){
 if(v3cur=='am'||v3cur=='rec'){
  const f=v3cur=='am'?'am':'rec';
  const roll={}; DET.roll.filter(r=>r[f]===name).forEach(r=>roll[r.contractor]=r.date);
  const book=DET.book.filter(r=>r[f]===name).map(r=>({...r,note:roll[r.contractor]?('Rolls off '+roll[r.contractor]):''}));
  const adds=DET.add.filter(r=>r[f]===name).map(r=>({...r,note:'New start '+r.date}));
  const all=[...book,...adds].sort((a,b)=>b.spread-a.spread);
  const cols=[{k:'contractor',label:'Contractor'},{k:'customer',label:'Customer'},{k:'office',label:'Office'},
   {k:'spread',label:'Weekly $',r:1,fmt:v=>fmt$(v)},{k:'note',label:'Q3 status',fmt:v=>v?`<span class="${v.indexOf('Rolls')==0?'down':'up'}">${v}</span>`:''}];
  openDrill(name, `Current book: ${book.length} placement(s) · ${fmt$(book.reduce((a,b)=>a+b.spread,0))}/wk`, dtbl(cols,all));
 } else {
  const f=v3cur=='am_by_office'?'office':'division';
  const book=DET.book.filter(r=>r[f]===name).sort((a,b)=>b.spread-a.spread);
  const cols=[{k:'contractor',label:'Contractor'},{k:'customer',label:'Customer'},{k:'am',label:'AM'},{k:'rec',label:'Recruiter'},{k:'spread',label:'Weekly $',r:1,fmt:v=>fmt$(v)}];
  openDrill(name+' — current book', `${book.length} placement(s) · ${fmt$(book.reduce((a,b)=>a+b.spread,0))}/wk`, dtbl(cols,book));
 }
}
function v4drill(name){
 const rows=DET.onb.filter(r=>r.customer===name).sort((a,b)=>b.days-a.days);
 const avg=rows.length?Math.round(rows.reduce((a,b)=>a+b.days,0)/rows.length):0;
 const cols=[{k:'contractor',label:'Contractor'},{k:'start',label:'Start date'},{k:'days',label:'Days to onboard',r:1,fmt:v=>`<span class="${v>30?'down':''}">${v}</span>`},{k:'emp',label:'Type'}];
 openDrill(name+' — onboarding', `${rows.length} start(s) since Jan 2025 · avg ${avg} days (ESF created → start)`, dtbl(cols,rows));
}
$('#v1tbl').addEventListener('click',e=>{const r=e.target.closest('tr.drill');if(r)v1drill(r.dataset.name);});
$('#v3tbl').addEventListener('click',e=>{const r=e.target.closest('tr.drill');if(r)v3drill(r.dataset.name);});
$('#v4cust').addEventListener('click',e=>{const r=e.target.closest('tr.drill');if(r)v4drill(r.dataset.name);});

// init
buildOverview();buildTrend('v1trend');v1table('cust_flow');buildV2();v3render('am');buildV4();mrender();
</script>
</body></html>
